name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  powershell:
    name: PowerShell validation
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run tests
        shell: pwsh
        run: ./scripts/test.ps1

  linux:
    name: Linux validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Linux tests
        shell: bash
        run: bash ./scripts/test-linux.sh
